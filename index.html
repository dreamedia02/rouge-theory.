<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rouge Theory | Official Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <a href="#order-form" class="sticky-btn">ORDER NOW</a>

    <div class="website-container">
        <div class="section-box"><img src="banner.png" class="full-img"></div>
        <div class="timer-bar">Flash Sale Ends In: <span id="timer">02:59:59</span></div>
        
        <div class="section-box"><img src="collection.png" class="full-img"></div>
        <div class="section-box"><img src="features.png" class="full-img"></div>

        <div class="gallery-title">
            <h2>THE VINTAGE COLLECTION</h2>
            <p>Select your favorite shades below</p>
        </div>

        <div class="shade-grid">
            <div class="shade-card"><img src="reine.png"><div class="shade-tag">REINE</div></div>
            <div class="shade-card"><img src="queen.png"><div class="shade-tag">QUEEN</div></div>
            <div class="shade-card"><img src="mademoiselle.png"><div class="shade-tag">MADEMOISELLE</div></div>
            <div class="shade-card"><img src="dame.png"><div class="shade-tag">DAME</div></div>
            <div class="shade-card"><img src="imperatrice.png"><div class="shade-tag">IMPÉRATRICE</div></div>
            <div class="shade-card"><img src="empress.png"><div class="shade-tag">EMPRESS</div></div>
        </div>

        <div class="section-box"><img src="footer-banner.png" class="full-img"></div>

        <section id="order-form" class="order-section">
            <div class="glass-form">
                <h2 style="font-family: 'Bodoni Moda'; text-align: center;">PLACE YOUR ORDER</h2>
                
                <form id="my-form" action="https://formspree.io/f/xvzvlayn" method="POST">
                    
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" name="Name" placeholder="Enter your name" required>
                    </div>

                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="tel" name="Phone" placeholder="0912-345-6789" required>
                    </div>

                    <div class="input-group">
                        <label>Delivery Address (Lalamove)</label>
                        <textarea name="Address" rows="2" placeholder="House No., Street, Brgy, City" required></textarea>
                    </div>

                    <div class="input-group">
                        <label>Select Your Shades (₱180 each)</label>
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px 10px; margin-top: 15px;">
                            
                            <label style="display: flex; align-items: center; cursor: pointer; font-size: 13px; font-weight: 500; text-transform: uppercase;">
                                <input type="checkbox" class="shade-cb" name="Shade_Reine" value="Ordered" style="margin-right: 10px; width: 18px; height: 18px; accent-color: #d4a373;">
                                <span>Reine</span>
                            </label>

                            <label style="display: flex; align-items: center; cursor: pointer; font-size: 13px; font-weight: 500; text-transform: uppercase;">
                                <input type="checkbox" class="shade-cb" name="Shade_Queen" value="Ordered" style="margin-right: 10px; width: 18px; height: 18px; accent-color: #d4a373;">
                                <span>Queen</span>
                            </label>

                            <label style="display: flex; align-items: center; cursor: pointer; font-size: 13px; font-weight: 500; text-transform: uppercase;">
                                <input type="checkbox" class="shade-cb" name="Shade_Mademoiselle" value="Ordered" style="margin-right: 10px; width: 18px; height: 18px; accent-color: #d4a373;">
                                <span>Mademoiselle</span>
                            </label>

                            <label style="display: flex; align-items: center; cursor: pointer; font-size: 13px; font-weight: 500; text-transform: uppercase;">
                                <input type="checkbox" class="shade-cb" name="Shade_Dame" value="Ordered" style="margin-right: 10px; width: 18px; height: 18px; accent-color: #d4a373;">
                                <span>Dame</span>
                            </label>

                            <label style="display: flex; align-items: center; cursor: pointer; font-size: 13px; font-weight: 500; text-transform: uppercase;">
                                <input type="checkbox" class="shade-cb" name="Shade_Imperatrice" value="Ordered" style="margin-right: 10px; width: 18px; height: 18px; accent-color: #d4a373;">
                                <span>Impératrice</span>
                            </label>

                            <label style="display: flex; align-items: center; cursor: pointer; font-size: 13px; font-weight: 500; text-transform: uppercase;">
                                <input type="checkbox" class="shade-cb" name="Shade_Empress" value="Ordered" style="margin-right: 10px; width: 18px; height: 18px; accent-color: #d4a373;">
                                <span>Empress</span>
                            </label>

                        </div>
                    </div>

                    <div class="input-group" style="margin-top: 20px;">
                        <label>Payment Method</label>
                        <select name="Payment_Method" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;" required>
                            <option value="GCash">GCash</option>
                            <option value="COD">Cash on Delivery (Lalamove COD)</option>
                        </select>
                    </div>

                    <div class="total-box" style="background: #1a1a1a; color: white; padding: 20px; border-radius: 10px; margin: 25px 0; text-align: center;">
                        <p style="margin: 0; font-size: 12px; opacity: 0.8;">Selected Items: <span id="item-count">0</span></p>
                        <h3 style="margin: 5px 0 0; color: #d4a373; font-family: 'Bodoni Moda'; font-size: 24px;">Total: ₱<span id="total-price">0</span></h3>
                        <input type="hidden" name="Grand_Total" id="hidden-total">
                    </div>

                    <button type="submit" id="submit-btn" class="submit-btn">CONFIRM ORDER</button>
                    <p id="status" style="margin-top: 15px; font-size: 13px; font-weight: bold; text-align: center;"></p>
                </form>
            </div>
        </section>

        <footer style="padding: 40px; text-align: center; font-size: 10px; color: #999; letter-spacing: 1px;">
            © 2026 ROUGE THEORY | DREAMEDIA ENTERPRISE
        </footer>
    </div>

    <script>
        // FORM SUBMISSION & REDIRECT
        var form = document.getElementById("my-form");
        async function handleSubmit(event) {
          event.preventDefault();
          var status = document.getElementById("status");
          var data = new FormData(event.target);
          status.style.color = "#d4a373";
          status.innerHTML = "Processing Order... Please wait.";
          
          fetch(event.target.action, {
            method: form.method,
            body: data,
            headers: { 'Accept': 'application/json' }
          }).then(response => {
            if (response.ok) {
              status.style.color = "green";
              status.innerHTML = "Success! Opening Messenger for confirmation...";
              setTimeout(() => {
                window.location.href = "https://m.me/andrea.garcia.348414";
              }, 2000);
            } else {
              status.style.color = "red";
              status.innerHTML = "Submission Error. Please try again.";
            }
          }).catch(error => {
            status.style.color = "red";
            status.innerHTML = "Network error. Check your internet.";
          });
        }
        form.addEventListener("submit", handleSubmit);

        // REAL-TIME PRICE CALCULATOR
        const checkboxes = document.querySelectorAll('.shade-cb');
        checkboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                let count = document.querySelectorAll('.shade-cb:checked').length;
                let total = count * 180;
                document.getElementById('total-price').innerText = total;
                document.getElementById('item-count').innerText = count;
                document.getElementById('hidden-total').value = "₱" + total;
            });
        });

        // COUNTDOWN TIMER
        let time = 10799; 
        setInterval(() => {
            let h = Math.floor(time/3600), m = Math.floor((time%3600)/60), s = time%60;
            document.getElementById('timer').innerHTML = `${h<10?'0':''}${h}:${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
            if (time > 0) time--;
        }, 1000);
    </script>
</body>
</html>
